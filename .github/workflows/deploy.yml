name: Deploy to S3 + CloudFront

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync static assets to S3 (long cache)
        run: |
          aws s3 sync out/ s3://anujaharsha.com \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.xml" \
            --exclude "*.txt" \
            --exclude "*.json"

      - name: Upload HTML files (no cache)
        run: |
          find out -name "*.html" -type f | while read -r file; do
            relative_path="${file#out/}"
            aws s3 cp "$file" "s3://anujaharsha.com/$relative_path" \
              --cache-control "public, max-age=0, must-revalidate" \
              --content-type "text/html"
          done

      - name: Upload sitemap and robots.txt
        run: |
          if [ -f "out/sitemap.xml" ]; then
            aws s3 cp out/sitemap.xml s3://anujaharsha.com/sitemap.xml \
              --content-type "application/xml" \
              --cache-control "public, max-age=3600"
          fi
          if [ -f "out/robots.txt" ]; then
            aws s3 cp out/robots.txt s3://anujaharsha.com/robots.txt \
              --content-type "text/plain" \
              --cache-control "public, max-age=3600"
          fi

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation --distribution-id E1RKSKYEABLX6E --paths "/*"
