name = "ask-anuja"
main = "worker.ts"
compatibility_date = "2025-09-01"

# Allowed origins for CORS. Defaults are baked in if you don't override.
[vars]
ALLOWED_ORIGINS = "https://anujaharsha.com,https://www.anujaharsha.com,http://localhost:3110"

# Rate-limit KV (created via `wrangler kv namespace create RATE_LIMIT`).
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "808b1dfb8b6d4c12b603b3088e6b4c84"
